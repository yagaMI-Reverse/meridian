services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meridian
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meridian"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/meridian
      APP_DATABASE_URL: postgresql://meridian_app:M3ridian.App.R0le.2026@db:5432/meridian
      JWT_SECRET: change-me-in-prod
      PORT: 4000
    ports:
      - "4000:4000"

volumes:
  pgdata:
